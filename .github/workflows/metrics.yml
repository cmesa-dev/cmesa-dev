name: 📊 Profile Metrics

on:
  schedule:
    - cron: "0 2 * * *"    # Cada día a las 2:00 AM (bajo impacto)
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: metrics
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  metrics:
    name: Generate profile metrics
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      # ── 1. Calendario isométrico 3D ─────────────────────────────────
      - name: 📅 Isometric contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: cmesa-dev
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Europe/Madrid
          filename: metrics/isocalendar.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update isocalendar [skip ci]"

      # ── 2. Lenguajes más usados (detallado) ─────────────────────────
      - name: 💻 Languages breakdown
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: cmesa-dev
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 1%
          plugin_languages_colors: github
          config_timezone: Europe/Madrid
          filename: metrics/languages.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update languages [skip ci]"

      # ── 3. Actividad reciente ────────────────────────────────────────
      - name: ⚡ Recent activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: cmesa-dev
          template: classic
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, pr, issue, release, review
          config_timezone: Europe/Madrid
          filename: metrics/activity.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update activity [skip ci]"

      # ── 4. Hábitos de código ─────────────────────────────────────────
      - name: 🧠 Coding habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: cmesa-dev
          template: classic
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: Europe/Madrid
          filename: metrics/habits.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update habits [skip ci]"
