name: 🐍 Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # Regenerar cada 12 horas
  workflow_dispatch:          # Ejecución manual desde GitHub
  push:
    branches: [main]

concurrency:
  group: snake
  cancel-in-progress: true    # Evitar ejecuciones solapadas

permissions:
  contents: write

jobs:
  generate:
    name: Generate snake animations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🐍 Generar animaciones (SVG light + dark + GIF)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-light.svg
            dist/snake-dark.svg?palette=github-dark
            dist/snake-purple.svg?palette=github-dark&color_snake=a78bfa&color_dots=#6d28d9,#7c3aed,#8b5cf6,#a78bfa,#c4b5fd

      - name: 📤 Publicar en rama output
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          force_orphan: false
          keep_files: true      # No borrar otros archivos (métricas, etc.)
          commit_message: "chore: regenerate snake [skip ci]"
